<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mian Rent A Car</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="without-driver.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <main id="loginScreen" class="login-screen">
    <section class="login-card">
      <div class="brand-mark">MR</div><p class="eyebrow">WELCOME TO</p><h1>Mian Rent A Car</h1>
      <p class="login-copy">Sign in to manage your vehicles, customers and rentals.</p>
      <form id="loginForm"><label>Username<input id="username" required autocomplete="username" placeholder="Enter username"></label><label>Password<input id="password" required type="password" autocomplete="current-password" placeholder="Enter password"></label><p id="loginError" class="error"></p><button class="primary wide" type="submit">Sign in <span>→</span></button></form>
      <p class="hint">Use the secure production admin credentials configured in Vercel.</p>
    </section>
  </main>

  <div id="app" class="app hidden">
    <aside class="sidebar"><div class="side-brand"><div class="mini-mark">MR</div><span>Mian <b>Rent A Car</b></span></div><nav id="nav"></nav><div class="side-bottom"><button id="logoutBtn" class="nav-btn">↪ <span>Sign out</span></button></div></aside>
    <div class="mobile-top"><button id="menuBtn">☰</button><b>Mian Rent A Car</b></div>
    <section class="workspace"><header><div><p id="pageKicker" class="eyebrow">OVERVIEW</p><h2 id="pageTitle">Dashboard</h2></div><div class="header-right"><img id="companyLogo" class="company-logo hidden" alt="NuraxTech Company logo"><small>Made By NuraxTech Company</small><div class="avatar">A</div></div></header><div id="view"></div></section>
  </div>
  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
  <script src="enhancements.js"></script>
</body>
</html>
